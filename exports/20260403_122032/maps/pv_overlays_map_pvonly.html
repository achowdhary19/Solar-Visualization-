            return '';
        } else if (typeof(feature)=='object') {
            return JSON.stringify(feature);
        } else {
            return feature;
        }

    let fields = ["name", "bbl", "shape_area", "construction_year", "ground_elevation", "mappluto_bbl", "objectid", "feature_code", "shape_length", "height_roof", "last_status_type", "bin"];

        String(
        fields.map(
        (v,i)=>
        `<tr>
            <th>${aliases[i]}</th>
            
            <td>${handleObject(layer.feature.properties[v])}</td>
        </tr>`).join(''))
    +'</table>';
    div.innerHTML=table;
    
    return div
    }
